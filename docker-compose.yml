# Production Docker Compose Configuration
# Usage: docker-compose up -d

services:
  bakwas:
    build: .
    container_name: bakwas-app
    ports:
      - "${PORT:-5000}:${PORT:-5000}"
    environment:
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - SECRET_KEY=${SECRET_KEY}
      - PORT=${PORT:-5000}
      - DEBUG=False
    env_file:
      - .env
    volumes:
      # Only persist database in production
      - ./data:/app/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:${PORT:-5000}/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
