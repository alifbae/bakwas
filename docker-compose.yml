services:
  bakwas:
    build: .
    container_name: bakwas-app
    ports:
      - "5000:5000"
    environment:
      # Provider API keys - set whichever ones you plan to use in .env
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - SECRET_KEY=${SECRET_KEY}
    volumes:
      # persist database in production
      - ./data:/app/data
      # Optional: mount a custom provider config without rebuilding the image.
      # Uncomment to enable.
      # - ./config/providers.local.yaml:/app/config/providers.local.yaml:ro
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
