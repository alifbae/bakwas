# Dependabot configuration
# https://docs.github.com/en/code-security/dependabot/working-with-dependabot/dependabot-options-reference
#
# Dependabot requires one entry per (ecosystem, directory) tuple. We use a
# single `pip` entry with daily scheduling: yt-dlp is the only dep that
# actually needs daily updates (YouTube breaks stale builds), and grouping
# the rest keeps review volume low.

version: 2
updates:
  # --- Python (runtime + dev) ----------------------------------------------
  - package-ecosystem: "pip"
    directory: "/"
    schedule:
      interval: "daily"
    labels:
      - "dependencies"
      - "python"
    commit-message:
      prefix: "chore(deps)"
      include: "scope"
    open-pull-requests-limit: 5
    groups:
      # yt-dlp is kept separate so its PR isn't blocked behind other updates
      # and is easy to spot / fast-merge.
      yt-dlp:
        patterns:
          - "yt-dlp"
      # Everything else rolls up into one PR per day to minimise review noise.
      python-dependencies:
        patterns:
          - "*"
        exclude-patterns:
          - "yt-dlp"

  # --- npm (test tooling: vitest, jsdom) -----------------------------------
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    labels:
      - "dependencies"
      - "javascript"
    commit-message:
      prefix: "chore(deps)"
      include: "scope"
    open-pull-requests-limit: 3
    groups:
      js-dependencies:
        patterns:
          - "*"

  # --- GitHub Actions ------------------------------------------------------
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    labels:
      - "dependencies"
      - "ci"
    commit-message:
      prefix: "chore(ci)"
      include: "scope"
    groups:
      gha-dependencies:
        patterns:
          - "*"
