# Dependabot configuration
# https://docs.github.com/en/code-security/dependabot/working-with-dependabot/dependabot-options-reference
#
# yt-dlp ships frequent releases and breaks when stale (YouTube changes things
# often), so it gets its own daily schedule ahead of the general weekly run.

version: 2
updates:
  # --- Python: yt-dlp (daily, high-priority) -------------------------------
  - package-ecosystem: "pip"
    directory: "/"
    schedule:
      interval: "daily"
    labels:
      - "dependencies"
      - "python"
      - "yt-dlp"
    commit-message:
      prefix: "chore(deps)"
      include: "scope"
    open-pull-requests-limit: 5
    allow:
      - dependency-name: "yt-dlp"

  # --- Python: everything else (weekly) ------------------------------------
  - package-ecosystem: "pip"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    labels:
      - "dependencies"
      - "python"
    commit-message:
      prefix: "chore(deps)"
      include: "scope"
    open-pull-requests-limit: 5
    ignore:
      # Handled by the daily job above.
      - dependency-name: "yt-dlp"

  # --- npm (test tooling: vitest, jsdom) -----------------------------------
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    labels:
      - "dependencies"
      - "javascript"
    commit-message:
      prefix: "chore(deps)"
      include: "scope"
    open-pull-requests-limit: 3

  # --- GitHub Actions ------------------------------------------------------
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    labels:
      - "dependencies"
      - "ci"
    commit-message:
      prefix: "chore(ci)"
      include: "scope"
