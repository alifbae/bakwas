name: CI

# Runs on pushes to main and on any PR so Dependabot bumps get tested too.
on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

# Cancel in-flight runs when a new commit is pushed to the same branch / PR.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  python:
    name: Python (pytest)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt -r requirements-dev.txt

      - name: Import check
        run: python -c "from src import app; print('import ok')"

      - name: Run pytest
        run: pytest

  javascript:
    name: JavaScript (vitest)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run vitest
        run: npm test
