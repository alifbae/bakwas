site_name: Bakwas
site_url: https://docs.bakwas.alifbae.dev/
site_description: Self-hosted YouTube transcript summarizer
site_author: alifbae
repo_url: https://github.com/alifbae/bakwas
repo_name: alifbae/bakwas
edit_uri: edit/main/docs/content/

docs_dir: content
use_directory_urls: true

theme:
  name: material
  language: en
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.instant
    - navigation.instant.progress
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - navigation.tracking
    - toc.follow
    - content.code.copy
    - content.code.annotate
    - content.action.edit
    - search.suggest
    - search.highlight
    - search.share
  icon:
    repo: fontawesome/brands/github

extra:
  generator: false

markdown_extensions:
  - admonition
  - attr_list
  - def_list
  - md_in_html
  - tables
  - toc:
      permalink: true
      toc_depth: 3
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.tasklist:
      custom_checkbox: true
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg

nav:
  - Home: index.md
  - Getting started:
      - Docker: getting-started/docker.md
      - Local development: getting-started/local.md
  - Configuration:
      - Environment variables: configuration/env.md
      - Providers: configuration/providers.md
      - Rate limiting: configuration/rate-limiting.md
  - Operations:
      - Reverse proxy: operations/reverse-proxy.md
      - Monitoring: operations/monitoring.md
      - Troubleshooting: operations/troubleshooting.md
  - Development: development/index.md
  - Reference:
      - Architecture: reference/architecture.md
